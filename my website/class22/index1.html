<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <h2>javascript arrays</h2>

    <p id="demo"></p>
    <script>

        var codingal = ["ronaldo","massi","neymar"];
        document.getElementById("demo").innerhtml = codingal[0];

        var student = {name : "ronaldo",age : "42",talent : "football"}
        document.write(student.name);
        document.write("<br>");
        document.write(student["age"]);
        document.write("<br>");
        document.write(student.talent);
        document.write("<br>");
        document.write(Math.floor(2.3));
        document.write("<br>");
        document.write(Math.random());
        document.write("<br>");
        document.write(Math.ceil(2.3));
        document.write("<br>");


    </script>
    
</body>
</html>
