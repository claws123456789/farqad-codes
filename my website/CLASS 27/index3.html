<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <p>click the button to evaluate javascript code.</p>
    <button onclick="myfunction()">try it</button>
    <div id="result"></div>
    <br><br>
    <script>
        function myfunction( ){
            var x = 10;
            var y = 20;
            var a = eval("x + y") + "<br>";
            var b = eval("2 * 2") + "<br>";
             var c = eval("y - x") + "<br>";

             var res = a+b+c;
             document.getElementById("result").innerHTML = res;
        }
    </script>
    
</body>
</html>
