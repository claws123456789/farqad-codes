<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <h2>loops</h2>
    <p id="demo">  </p>

    <script>

        var fruit = ["apple","mango","orange","watermelon","grapes"];

        for(i = 0;i < fruit.length; i++){
            var text = fruit[i] + "<br>";
            document.getElementById("demo").innerHTML += text;
            document.write(text);
        }
    </script>
    
</body>
</html>
