<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <h2>strings</h2>
    <p>basic methods</p>

    <script>
        var str ="AmAzInG";
        document.write(str.toUpperCase());
        document.write("<br>");
        document.write(str.toLowerCase());
        document.write("<br>");
        document.write(str.startsWith('A'));
        document.write("<br>");
         
        var str1 = "I learnt about methods ";
        var patt = new RegExp("about");
        var res = patt.test(str1);
        document.write(patt);
        document.write("<br>");
        document.write(res);
    </script>
    
</body>
</html>
